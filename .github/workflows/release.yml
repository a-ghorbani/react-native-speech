name: Release

# Auto-release on push to main is intentionally DISABLED: `main` is a
# protected branch and the Actions bot can't push release-it's version
# commit/tag (npm publish succeeds first, then the git push is rejected,
# leaving npm/git inconsistent). Re-enable the `push` trigger below once
# the bot is granted a branch-protection bypass (or we move to a
# release-PR flow). Until then this only runs when triggered manually.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

# Never run two releases at once; don't cancel a release mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the bot's own "chore: release x.y.z" commit so we don't loop.
    # Quoted because the `: ` inside 'chore: release' otherwise makes YAML
    # parse this as a nested mapping → workflow startup_failure.
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: release') }}"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup
        uses: ./.github/actions/setup

      # Trusted publishing (OIDC) needs npm >= 11.5.1; the Node in .nvmrc
      # bundles npm 10.x, which can't do the OIDC token exchange.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # --npm.skipChecks skips release-it's pre-flight `npm whoami`/collaborator
      # check, which fails under trusted publishing (no token in CI). The real
      # auth + provenance happen inside `npm publish` via OIDC.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn release-it --ci --npm.skipChecks
